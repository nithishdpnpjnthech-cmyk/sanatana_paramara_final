# Production Configuration for EC2/Render
# Centralized configuration is in application.properties.
# Use this file for environment-specific overrides only.

# Example: If you want to use a different database in production
# spring.datasource.url=${DATABASE_URL}
# spring.datasource.username=${DATABASE_USER}
# spring.datasource.password=${DATABASE_PASSWORD}

# JPA/Hibernate Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect